# Provides context for AI to understand available data for location analysis
# Data cubes available for analysis
cubes:
  - name: higher_edu_by_county
    sql_table: cartobq.public_account.higher_edu_by_county
    title: Higher Education by County
    description: Higher education data by county

    geo:
      geometry_column: geom
      geometry_type: geometry
      initial_view:
        longitude: -98.5795
        latitude: 39.8283
        zoom: 4
        pitch: 0
        bearing: 0

    dimensions:
      - name: geom
        sql: geom
        type: geometry
        description: County geometry

      - name: pct_gop
        sql: pct_gop
        type: number
        description: Percentage GOP votes

      - name: fid
        sql: fid
        type: number
        description: Feature ID

      - name: trump
        sql: trump
        type: number
        description: Trump vote count

      - name: clinton
        sql: clinton
        type: number
        description: Clinton vote count

      - name: pct_dem
        sql: pct_dem
        type: number
        description: Percentage Democratic votes

      - name: county_winner
        sql: county_winner
        type: string
        description: County election winner (dem/gop)

      - name: fips
        sql: fips
        type: string
        description: FIPS county code

      - name: pct_higher_ed
        sql: pct_higher_ed
        type: number
        description: Percentage with higher education

      - name: income_100000_or_more
        sql: income_100000_or_more
        type: number
        description: Count of households with income $100k+

      - name: name
        sql: name
        type: string
        description: County name

      - name: pct_clinton
        sql: pct_clinton
        type: number
        description: Percentage Clinton votes

      - name: pct_trump
        sql: pct_trump
        type: number
        description: Percentage Trump votes

      - name: pct_higher_edu
        sql: pct_higher_edu
        type: number
        description: Percentage with higher education (alternate)

      - name: pct_dem_r
        sql: pct_dem_r
        type: number
        description: Percentage Democratic (rounded)

      - name: pct_income_100k
        sql: pct_income_100k
        type: number
        description: Percentage of households with income $100k+

    measures:

  - name: usa_spatial_features_h3
