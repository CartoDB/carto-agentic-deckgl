  - name: populated_places
    sql_table: ps-catalog-default.ps-demo-tables.populated_places
    title: Populated Places
    description: Major cities and populated places worldwide with population data

    geo:
      geometry_column: geom
      geometry_type: point
      initial_view:
        longitude: -98.5795
        latitude: 39.8283
        zoom: 3
        pitch: 0
        bearing: 0

    dimensions:
      - name: geom
        sql: geom
        type: geometry
        description: Point location

      - name: name
        sql: name
        type: string
        title: City Name
        description: Name of the populated place

      - name: country_name
        sql: adm0name
        type: string
        title: Country
        description: Country where the place is located
        geo_viz:
          style: colorCategories

      - name: adm1name
        sql: adm1name
        type: string
        title: State/Province
        description: First-level administrative division (state, province)

      - name: pop_max
        sql: pop_max
        type: number
        title: Maximum Population
        description: Maximum population estimate
        geo_viz:
          style: colorBins
          palette: Sunset
          domain: [10000, 100000, 500000, 1000000, 5000000]
          recommended: true

      - name: pop_min
        sql: pop_min
        type: number
        title: Minimum Population
        description: Minimum population estimate

      - name: scalerank
        sql: scalerank
        type: number
        title: Scale Rank
        description: Importance rank for map display (0 = most important)

      - name: worldcity
        sql: worldcity
        type: string
        title: World City
        description: World city flag indicator

      - name: megacity
        sql: megacity
        type: string
        title: Megacity
        description: Megacity flag indicator (10M+ population)

      - name: latitude
        sql: latitude
        type: number
        title: Latitude
        description: Latitude coordinate

      - name: longitude
        sql: longitude
        type: number
        title: Longitude
        description: Longitude coordinate

      - name: timezone
