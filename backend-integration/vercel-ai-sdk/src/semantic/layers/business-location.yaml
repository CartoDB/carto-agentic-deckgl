# Business Location Finder Semantic Layer
# Provides context for AI to understand available data for location analysis

name: Business Location Finder

# POI Categories (replaces old business types)
business_types:
  - id: civic_amenities
    name: Civic Amenities
    icon: account_balance
    description: Government buildings, public services, community centers

  - id: commercial
    name: Commercial
    icon: store
    description: Shops, offices, business establishments

  - id: education
    name: Education
    icon: school
    description: Schools, universities, training centers

  - id: entertainment_arts_culture
    name: Entertainment, Arts & Culture
    icon: theater_comedy
    description: Theaters, museums, galleries, venues

  - id: financial
    name: Financial
    icon: payments
    description: Banks, ATMs, financial services

  - id: healthcare
    name: Healthcare
    icon: local_hospital
    description: Hospitals, clinics, pharmacies

  - id: others
    name: Others
    icon: more_horiz
    description: Miscellaneous points of interest

  - id: sustenance
    name: Sustenance
    icon: restaurant
    description: Restaurants, cafes, food establishments

  - id: tourism
    name: Tourism
    icon: tour
    description: Hotels, attractions, tourist services

  - id: transportation
    name: Transportation
    icon: directions_transit
    description: Transit stations, parking, transportation hubs

# Radius options for POI search (replaces proximity_priorities)
radius_options:
  - id: radius_3
    value: 3
    unit: miles
    label: 3 miles

  - id: radius_5
    value: 5
    unit: miles
    label: 5 miles

  - id: radius_10
    value: 10
    unit: miles
    label: 10 miles

drivetime_options:
  - id: drivetime_5
    value: 5
    unit: minutes
    label: 5 minutes

  - id: drivetime_10
    value: 10
    unit: minutes
    label: 10 minutes

  - id: drivetime_15
    value: 15
    unit: minutes
    label: 15 minutes

  - id: drivetime_20
    value: 20
    unit: minutes
    label: 20 minutes
    
  - id: drivetime_30
    value: 30
    unit: minutes
    label: 30 minutes

# Data cubes available for analysis
cubes:
  - name: us_demographics_h3
    sql_table: ps-catalog-default.ps-demo-tables.derived_spatialfeatures_usa_h3res8_v1_yearly_v2
    title: US Demographics (H3)
    description: US demographic data aggregated to H3 resolution 8 hexagons

    geo:
      geometry_column: h3
      geometry_type: h3
      initial_view:
        longitude: -98.5795
        latitude: 39.8283
        zoom: 4
        pitch: 0
        bearing: 0

    dimensions:
      - name: h3
        sql: h3
        type: geometry
        description: H3 hexagon index at resolution 8

      - name: do_date
        sql: do_date
        type: date
        title: Date
        description: Data observation date

      - name: population
        sql: population
        type: number
        title: Total Population
        description: Total population count
        geo_viz:
          style: colorBins
          palette: PurpOr
          domain: [100, 500, 1000, 5000, 10000]
          recommended: true

      - name: female
        sql: female
        type: number
        title: Female Population
        description: Number of female population
        geo_viz:
          style: colorBins
          palette: PurpOr
          domain: [100, 500, 1000, 5000, 10000]
          recommended: true

      - name: male
        sql: male
        type: number
        title: Male Population
        description: Number of male population
        geo_viz:
          style: colorBins
          palette: PurpOr
          domain: [100, 500, 1000, 5000, 10000]
          recommended: true

      - name: urbanity
        sql: urbanity
        type: string
        title: Urbanity
        description: Urban, suburban, or rural classification
        geo_viz:
          style: colorCategories
          categories: [urban, suburban, rural]

      - name: elevation
        sql: elevation
        type: number
        title: Elevation
        description: Average elevation in meters
        geo_viz:
          style: colorContinuous
          palette: Earth
          domain: [0, 3000]

      - name: retail_count
        sql: retail
        type: number
        title: Retail POI Count
        description: Number of retail points of interest

      - name: food_drink_count
        sql: food_drink
        type: number
        title: Food & Drink POI Count
        description: Number of food and drink points of interest

      - name: healthcare_count
        sql: healthcare
        type: number
        title: Healthcare POI Count
        description: Number of healthcare points of interest

    measures:
      - name: count
        sql: "*"
        type: count
        title: Cell Count

      - name: sum_female
        sql: female
        type: sum
        title: Total Female Population

      - name: sum_male
        sql: male
        type: sum
        title: Total Male Population

      - name: sum_population
        sql: population
        type: sum
        title: Total Population

  - name: osm_pois
    sql_table: ps-catalog-default.ps-demo-tables.osm_pois_usa
    title: Points of Interest (OSM)
    description: OpenStreetMap points of interest for the United States

    geo:
      geometry_column: geom
      geometry_type: point
      initial_view:
        longitude: -98.5795
        latitude: 39.8283
        zoom: 4

    dimensions:
      - name: geom
        sql: geom
        type: geometry
        description: Point location

      - name: osm_id
        sql: osm_id
        type: number
        title: OSM ID
        description: OpenStreetMap unique identifier

      - name: name
        sql: name
        type: string
        title: POI Name
        description: Name of the point of interest

      - name: address
        sql: address
        type: string
        title: Address
        description: POI street address

      - name: group_name
        sql: group_name
        type: string
        title: Category
        description: POI category group
        geo_viz:
          style: colorCategories
          categories: [Transportation, Sustenance, Entertainment, Education, Healthcare, Tourism, Financial, Commercial, Civic amenities, Others]

      - name: subgroup_name
        sql: subgroup_name
        type: string
        title: Subcategory
        description: More specific POI classification

      - name: map_marker
        sql: map_marker
        type: string
        title: Map Marker
        description: Map marker type

      - name: all_tags
        sql: all_tags
        type: string
        title: All Tags
        description: All OpenStreetMap tags

      - name: geohash
        sql: geohash
        type: string
        title: Geohash
        description: Geohash location code

    measures:
      - name: count
        sql: "*"
        type: count
        title: POI Count

  - name: us_demographics_blockgroup
    sql_table: ps-catalog-default.ps-demo-tables.demographics
    title: US Demographics (Block Group)
    description: US demographic data at Census block group level with detailed population, income, age, education, and housing statistics

    geo:
      geometry_column: geom
      geometry_type: polygon
      initial_view:
        longitude: -98.5795
        latitude: 39.8283
        zoom: 4
        pitch: 0
        bearing: 0

    dimensions:
      - name: geom
        sql: geom
        type: geometry
        description: Block group polygon geometry

      - name: geoid
        sql: geoid
        type: string
        title: GEOID
        description: Block group identifier

      - name: blockgroup
        sql: BLOCKGROUP
        type: string
        title: Block Group
        description: Block group code

      - name: total_pop
        sql: POPCY
        type: number
        title: Total Population
        description: Total population count
        geo_viz:
          style: colorBins
          palette: PurpOr
          domain: [100, 500, 1000, 5000, 10000]
          recommended: true

      - name: median_age
        sql: AGECYMED
        type: number
        title: Median Age
        description: Median age of the population
        geo_viz:
          style: colorContinuous
          palette: Teal
          domain: [20, 60]

      - name: median_hh_income
        sql: INCCYMEDHH
        type: number
        title: Median Household Income
        description: Median household income in USD
        geo_viz:
          style: colorContinuous
          palette: Sunset
          domain: [20000, 150000]

      - name: unemployment_rate
        sql: UNECYRATE
        type: number
        title: Unemployment Rate
        description: Percentage of unemployed working-age population
        geo_viz:
          style: colorContinuous
          palette: OrYel
          domain: [0, 20]

      - name: bachelor_degree
        sql: EDUCYBACH
        type: number
        title: Bachelor's Degree
        description: Population with bachelor's degree
        geo_viz:
          style: colorContinuous
          palette: BluYl
          domain: [0, 5000]

      - name: owner_occupied
        sql: DWLCYOWNED
        type: number
        title: Owner Occupied Dwellings
        description: Number of owner-occupied housing units
        geo_viz:
          style: colorContinuous
          palette: Mint
          domain: [0, 2000]

      - name: total_households
        sql: HHDCY
        type: number
        title: Total Households
        description: Total number of households

    measures:
      - name: count
        sql: "*"
        type: count
        title: Block Group Count

      - name: avg_income
        sql: INCCYMEDHH
        type: avg
        title: Average Median Income

      - name: sum_population
        sql: POPCY
        type: sum
        title: Total Population

  - name: us_demographics_quadbin
