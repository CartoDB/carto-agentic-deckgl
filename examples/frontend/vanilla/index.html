<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CARTO AI tools Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.12.0/dist/maplibre-gl.css" />
</head>
<body>
  <div id="app" class="app-container">
    <div id="main-layout" class="main-layout">
      <!-- Map Column -->
      <div class="map-column">
        <header class="app-header">
          <h1 class="app-title">CARTO AI tools Demo</h1>
        </header>

        <div id="map-container-wrapper" class="map-container">
          <!-- deck.gl + MapLibre -->
          <div id="map-container" style="position: absolute; width: 100%; height: 100%;"></div>
          <canvas id="map-container-canvas" style="position: absolute; width: 100%; height: 100%;"></canvas>

          <!-- Layer Toggle + Draw Tool -->
          <div id="top-left-controls" class="top-left-controls">
            <div id="layer-toggle-wrapper"></div>
            <div id="draw-tool-wrapper"></div>
          </div>

          <!-- Zoom Controls -->
          <div id="zoom-controls-wrapper" class="zoom-controls-wrapper"></div>
        </div>
      </div>

      <!-- Widget Container -->
      <div id="widget-container-wrapper"></div>

      <!-- Sidebar / Chat -->
      <div id="sidebar-column" class="sidebar-column"></div>
    </div>

    <!-- FAB Button -->
    <button id="fab-button" class="fab-button" aria-label="Toggle chat sidebar" style="display: none;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>

    <!-- Snackbar container -->
    <div id="snackbar-container"></div>

    <!-- Confirmation dialog container -->
    <div id="dialog-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
