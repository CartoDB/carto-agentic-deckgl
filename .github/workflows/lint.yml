name: Lint

on:
  workflow_call:

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Install and build map-ai-tools first (dependency for frontend components)
      - name: Install map-ai-tools dependencies
        working-directory: ./map-ai-tools
        run: npm ci

      - name: Build map-ai-tools
        working-directory: ./map-ai-tools
        run: npm run build

      # Backend typecheck
      - name: Install backend dependencies
        working-directory: ./backend-integration/vercel-ai-sdk
        run: npm ci

      - name: Typecheck backend
        working-directory: ./backend-integration/vercel-ai-sdk
        run: npm run typecheck

      # map-ai-tools typecheck
      - name: Typecheck map-ai-tools
        working-directory: ./map-ai-tools
        run: npm run type-check

      # Angular typecheck
      - name: Install Angular dependencies
        working-directory: ./frontend-integration/angular
        run: pnpm install --frozen-lockfile

      - name: Create Angular environment file
        working-directory: ./frontend-integration/angular
        run: cp src/environments/environment.example src/environments/environment.ts

      - name: Typecheck Angular
        working-directory: ./frontend-integration/angular
        run: pnpm typecheck

      # React typecheck
      - name: Install React dependencies
        working-directory: ./frontend-integration/react
        run: pnpm install --frozen-lockfile

      - name: Typecheck React
        working-directory: ./frontend-integration/react
        run: pnpm typecheck
