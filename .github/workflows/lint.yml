name: Lint

on:
  workflow_call:

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Core library
      - name: Install core library dependencies
        run: npm ci

      - name: Build core library
        run: npm run build

      # Backend typecheck (override published package with local build)
      - name: Install backend dependencies
        working-directory: ./examples/backend/vercel-ai-sdk
        run: npm ci && npm install ../../..

      - name: Typecheck backend
        working-directory: ./examples/backend/vercel-ai-sdk
        run: npm run typecheck

      # Core library typecheck
      - name: Typecheck core library
        run: npm run type-check

      # Angular typecheck (override published package with local build)
      - name: Install Angular dependencies
        working-directory: ./examples/frontend/angular
        run: pnpm install --frozen-lockfile && pnpm add ../../..

      - name: Create Angular environment file
        working-directory: ./examples/frontend/angular
        run: cp src/environments/environment.example src/environments/environment.ts

      - name: Typecheck Angular
        working-directory: ./examples/frontend/angular
        run: pnpm typecheck

      # React typecheck (override published package with local build)
      - name: Install React dependencies
        working-directory: ./examples/frontend/react
        run: pnpm install --frozen-lockfile && pnpm add ../../..

      - name: Typecheck React
        working-directory: ./examples/frontend/react
        run: pnpm typecheck

      # Vue typecheck (override published package with local build)
      - name: Install Vue dependencies
        working-directory: ./examples/frontend/vue
        run: pnpm install --frozen-lockfile && pnpm add ../../..

      - name: Typecheck Vue
        working-directory: ./examples/frontend/vue
        run: pnpm typecheck
