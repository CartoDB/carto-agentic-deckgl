name: Lint

on:
  workflow_call:

jobs:
  # ── Core library + backends (run in parallel with frontends) ──
  backends:
    name: Core & Backends
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build map-ai-tools (dependency for all backends)
      - name: Install map-ai-tools dependencies
        working-directory: ./map-ai-tools
        run: npm ci

      - name: Build map-ai-tools
        working-directory: ./map-ai-tools
        run: npm run build

      - name: Typecheck map-ai-tools
        working-directory: ./map-ai-tools
        run: npm run type-check

      # Vercel AI SDK
      - name: Install Vercel AI SDK dependencies
        working-directory: ./backend-integration/vercel-ai-sdk
        run: npm ci

      - name: Typecheck Vercel AI SDK
        working-directory: ./backend-integration/vercel-ai-sdk
        run: npm run typecheck

      # OpenAI Agents SDK
      - name: Install OpenAI Agents SDK dependencies
        working-directory: ./backend-integration/openai-agents-sdk
        run: npm ci

      - name: Typecheck OpenAI Agents SDK
        working-directory: ./backend-integration/openai-agents-sdk
        run: npm run typecheck

      # Google ADK
      - name: Install Google ADK dependencies
        working-directory: ./backend-integration/google-adk
        run: npm install --force

      - name: Typecheck Google ADK
        working-directory: ./backend-integration/google-adk
        run: npm run typecheck

  # ── Frontends (run in parallel with backends) ──
  frontends:
    name: Frontends
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Build map-ai-tools (dependency for all frontends)
      - name: Install map-ai-tools dependencies
        working-directory: ./map-ai-tools
        run: npm ci

      - name: Build map-ai-tools
        working-directory: ./map-ai-tools
        run: npm run build

      # Angular
      - name: Install Angular dependencies
        working-directory: ./frontend-integration/angular
        run: pnpm install --frozen-lockfile

      - name: Create Angular environment file
        working-directory: ./frontend-integration/angular
        run: cp src/environments/environment.example src/environments/environment.ts

      - name: Typecheck Angular
        working-directory: ./frontend-integration/angular
        run: pnpm typecheck

      # React
      - name: Install React dependencies
        working-directory: ./frontend-integration/react
        run: pnpm install --frozen-lockfile

      - name: Typecheck React
        working-directory: ./frontend-integration/react
        run: pnpm typecheck

      # Vue
      - name: Install Vue dependencies
        working-directory: ./frontend-integration/vue
        run: pnpm install --frozen-lockfile

      - name: Typecheck Vue
        working-directory: ./frontend-integration/vue
        run: pnpm typecheck
