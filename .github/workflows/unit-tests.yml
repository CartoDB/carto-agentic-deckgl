name: Tests

on:
  workflow_call:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Run core library tests
      - name: Install core library dependencies
        run: npm ci

      - name: Build core library
        run: npm run build

      - name: Test core library
        run: npm test

      # Run backend tests
      - name: Install backend dependencies
        working-directory: ./examples/backend/vercel-ai-sdk
        run: npm ci

      - name: Test backend
        working-directory: ./examples/backend/vercel-ai-sdk
        run: npm test

      # Run Angular tests
      - name: Install Angular dependencies
        working-directory: ./examples/frontend/angular
        run: pnpm install --frozen-lockfile

      - name: Test Angular
        working-directory: ./examples/frontend/angular
        run: pnpm test

      # Run React tests
      - name: Install React dependencies
        working-directory: ./examples/frontend/react
        run: pnpm install --frozen-lockfile

      - name: Test React
        working-directory: ./examples/frontend/react
        run: pnpm test

      # Run Vanilla tests
      - name: Install Vanilla dependencies
        working-directory: ./examples/frontend/vanilla
        run: pnpm install --frozen-lockfile

      - name: Test Vanilla
        working-directory: ./examples/frontend/vanilla
        run: pnpm test

      # Run Vue tests
      - name: Install Vue dependencies
        working-directory: ./examples/frontend/vue
        run: pnpm install --frozen-lockfile

      - name: Test Vue
        working-directory: ./examples/frontend/vue
        run: pnpm test
