name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**']

jobs:
  # Security scan runs first — blocks everything if secrets found
  security-scan:
    name: Gitleaks Secret Scan
    uses: ./.github/workflows/security-scan.yml
    secrets: inherit

  # Linting runs after security scan passes
  lint:
    name: Code Quality (Lint)
    needs: security-scan
    if: always() && (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped')
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  # Unit tests run after linting passes
  unit-tests:
    name: Unit Tests
    needs: lint
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit

  # E2E tests run after unit tests pass
  e2e-tests:
    name: E2E Tests
    needs: unit-tests
    uses: ./.github/workflows/e2e-tests.yml
    with:
      backend: openai-agents-sdk
    secrets: inherit
