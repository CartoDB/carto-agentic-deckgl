name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**']

jobs:
  # Security scan runs first — blocks everything if secrets found
  security-scan:
    name: Gitleaks Secret Scan
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/security-scan.yml
    secrets: inherit

  # Linting runs after security scan passes
  lint:
    name: Code Quality (Lint)
    needs: security-scan
    if: needs.security-scan.result == 'success'
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  # Unit tests run after linting passes
  unit-tests:
    name: Unit Tests
    needs: lint
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit

  # E2E tests only run on push to main/dev (i.e., after PR merge) to avoid extra consumption
  e2e-tests:
    name: E2E Tests
    needs: unit-tests
    if: github.event_name == 'push'
    uses: ./.github/workflows/e2e-tests.yml
    with:
      backend: openai-agents-sdk
    secrets: inherit

  # Release to NPM when a chore(release) commit lands on main
  release:
    name: Release to NPM
    needs: e2e-tests
    if: |
      github.ref_name == 'main' &&
      startsWith(github.event.head_commit.message, 'chore(release)')
    uses: ./.github/workflows/release.yml
    secrets: inherit
