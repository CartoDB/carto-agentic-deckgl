name: Release

on:
  workflow_call:
    secrets:
      NPM_CARTODB_AUTH_TOKEN:
        required: true
  workflow_dispatch:

env:
  NODE_VERSION: 22
  CI: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: version
        run: echo "PKG_VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Assign dist tag
        id: dist-tag
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const version = '${{ steps.version.outputs.PKG_VERSION }}'
            console.log(`version: ${version}`)
            let distTag
            if (version.match(/^v\d+\.\d+\.\d+$/)) {
              distTag = 'latest'
            } else if (version.match(/^v\d+\.\d+\.\d+/)) {
              distTag = 'alpha'
            } else {
              core.setFailed('Version must follow SemVer convention. Aborting.');
            }
            console.log(`npm dist tag: ${distTag}`)
            return distTag

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_CARTODB_AUTH_TOKEN }}
          DIST_TAG: ${{ steps.dist-tag.outputs.result }}
        run: npm publish --tag ${DIST_TAG} --access public
