<div class="chat-container">
  <div class="chat-header">
    <h3 class="chat-title">Map Control Chat</h3>
    <span class="connection-status" [class.connected]="isConnected">●</span>
  </div>

  <div class="chat-messages">
    @for (msg of messages; track trackByMessage($index, msg)) {
      <div [class]="getMessageClasses(msg)" [ngStyle]="getMessageStyle(msg)">
        @if (msg.type === 'assistant') {
          <markdown [data]="msg.content"></markdown>
        } @else {
          {{ msg.content }}
        }
        @if (msg.streaming) {
          <span class="streaming-indicator">▌</span>
        }
      </div>
    }
    @if (loaderState) {
      <div class="tool-loader">
        <span class="tool-loader-text">{{ loaderState === 'thinking' ? 'Thinking' : 'Executing tools' }}</span>
        <span class="tool-loader-dots">
          <span class="dot">.</span>
          <span class="dot">.</span>
          <span class="dot">.</span>
        </span>
      </div>
    }
    <div #messagesEnd></div>
  </div>

  <div class="chat-input-container">
    <input
      type="text"
      class="chat-input"
      [(ngModel)]="input"
      (keypress)="handleKeyPress($event)"
      placeholder="Type a command (e.g., 'zoom in', 'fly to San Francisco')"
    />
    <button
      class="send-button"
      (click)="handleSend()"
      [disabled]="!isConnected">
      Send
    </button>
  </div>
</div>
