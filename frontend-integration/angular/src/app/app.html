<div style="display: flex; width: 100vw; height: 100vh;">
  <div style="flex: 1; position: relative;">
    <app-map-view
      (mapInit)="handleMapInit($event)"
      (viewStateChange)="handleViewStateChange($event)">
    </app-map-view>

    <!-- Layer Toggle - top left -->
    <div style="position: absolute; top: 10px; left: 10px; z-index: 100;">
      <app-layer-toggle
        [disabled]="controlsDisabled"
        [layers]="layers"
        (toggle)="handleLayerToggle($event)">
      </app-layer-toggle>
    </div>

    <!-- Zoom Controls - bottom left -->
    <div style="position: absolute; bottom: 30px; left: 10px; z-index: 100;">
      <app-zoom-controls
        [disabled]="controlsDisabled"
        [zoomLevel]="zoomLevel"
        (zoomIn)="handleZoomIn()"
        (zoomOut)="handleZoomOut()">
      </app-zoom-controls>
    </div>
  </div>

  <app-chat-ui
    [isConnected]="isConnected"
    [messages]="messages"
    [loaderState]="loaderState"
    (sendMessage)="handleSendMessage($event)">
  </app-chat-ui>

  <app-snackbar
    [message]="snackbar.message"
    [type]="snackbar.type"
    (close)="hideSnackbar()">
  </app-snackbar>
</div>
