<div style="display: flex; width: 100vw; height: 100vh;">
  <div style="flex: 1; position: relative;">
    <app-map-view (mapInit)="handleMapInit($event)"></app-map-view>
    <app-zoom-controls [disabled]="!isConnected"></app-zoom-controls>
    <app-layer-toggle [disabled]="!isConnected"></app-layer-toggle>
  </div>
  <app-chat-ui
    [isConnected]="isConnected"
    [messages]="messages"
    (sendMessage)="handleSendMessage($event)">
  </app-chat-ui>
</div>
